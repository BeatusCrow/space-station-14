- type: entity
  parent: BaseItem
  id: SyndTeleportationZoneConsole
  name: Syndicate teleportation control panel
  description: A panel that allows you to manage time and space... It's like you're the creator!
  components:
    - type: Sprite
      sprite: Objects/Devices/teleportation_zone_console.rsi
      state: console
    - type: TeleportationZoneConsole
    - type: ActivatableUI
      key: enum.TeleportationZoneUiKey.Key
    - type: UserInterface
      interfaces:
        enum.TeleportationZoneUiKey.Key:
          type: TeleportationZoneBoundUi
    - type: NukeTeleportationZone
